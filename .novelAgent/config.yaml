deepseek:
    api_endpoint: https://api.deepseek.com/v1/chat/completions
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 4096
    model_name: deepseek-chat
    retry_times: 3
    temperature: 0.6
    timeout: 60
global_rules:
    language: zh-CN
    network:
        ask_permission: true
        enabled: false
    rules:
        - 全程使用简体中文输出，包括所有说明、描述、对话、叙述
        - 专有名词、技术术语可保留原文（如 API、SDK、GDP、CEO 等）
        - 人名、地名、品牌名等专有名称可保留英文或拼音原文
        - 网络热梗、流行语、meme 可以使用，但涉及实时信息时需申请联网权限
        - 代码块、命令行示例保持英文原样
        - 禁止输出繁体中文
        - 数字使用阿拉伯数字
        - 标点符号使用全角中文标点
mimo:
    api_endpoint: https://token-plan-cn.xiaomimimo.com/v1/chat/completions
    api_key: ${MIMO_API_KEY}
    max_tokens: 8192
    model_name: mimo-v2.5
    retry_times: 3
    temperature: 0.7
    timeout: 60
minimax:
    api_endpoint: https://api.minimax.chat/v1/text/chatcompletion_v2
    api_key: ${MINIMAX_API_KEY}
    max_tokens: 4096
    model_name: abab6.5s-chat
    retry_times: 3
    temperature: 0.8
    timeout: 60
stage_routing:
    content_generation: deepseek
    fallback: deepseek
    genre_init: deepseek
    hooks_placement: deepseek
    outline_generation: deepseek
    polish: deepseek
