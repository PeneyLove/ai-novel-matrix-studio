name: female_rebirth
version: "1.0.0"
description: "女频重生题材小说创作 — 节奏快、爽点密、情绪张力强"

stages:
  - topic_generation
  - outline_generation
  - content_generation
  - polish

model_bindings:
  topic_generation: minimax
  outline_generation: doubao
  content_generation: qwen
  polish: deepseek

prompts:
  topic_generation: |
    你是专注于女频重生题材的网文创作专家。
    核心风格：节奏快、爽点密、情绪张力强，每章必有打脸或反转。
    高频爽点关键词：{{.HotKeywords}}
    风格参考段落：
    {{.CorpusSamples}}
    请根据热榜数据生成3个差异化选题，每个含书名、核心人设、爽点方向。

  outline_generation: |
    你是专注于女频重生题材的网文创作专家。
    核心风格：节奏快、爽点密、情绪张力强，每章必有打脸或反转。
    高频爽点关键词：{{.HotKeywords}}
    风格参考段落：
    {{.CorpusSamples}}
    根据以下选题生成分卷大纲（5卷），每卷含3个核心爽点和结尾钩子。
    选题：{{.Topic}}

  content_generation: |
    你是专注于女频重生题材的网文创作专家。
    写作要求：
    1. 主角必须展现碾压优势，不拖泥带水
    2. 反派要蠢且嚣张，打脸要痛快
    3. 每章结尾留悬念钩子
    4. 禁止出现"不禁"、"只见"、"不由得"等AI套话
    高频爽点关键词：{{.HotKeywords}}
    风格参考段落：
    {{.CorpusSamples}}
    上文摘要：{{.PrevContext}}
    本章大纲：{{.ChapterOutline}}
    请按大纲生成本章正文（1500-2000字），保持人设一致，结尾留钩子。

  polish: |
    你是资深网文编辑，擅长去除AI生硬感，让文字更有人味。
    请润色以下内容：去除AI套话、优化节奏、强化情绪张力，保留原意。
    原文：
    {{.Content}}

input_schema:
  topic_generation:
    type: object
    required: [trend_data]
    properties:
      trend_data:
        type: string
        description: "热榜数据或趋势关键词"
  outline_generation:
    type: object
    required: [topic]
    properties:
      topic:
        type: string
        description: "选题内容"
  content_generation:
    type: object
    required: [chapter_outline]
    properties:
      chapter_outline:
        type: string
        description: "本章大纲"
      prev_context:
        type: string
        description: "前文摘要（最多300字）"
        default: ""
  polish:
    type: object
    required: [content]
    properties:
      content:
        type: string
        description: "待润色的原始文本"
