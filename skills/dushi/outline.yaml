name: dushi_outline
version: "2.0.0"
description: "都市网文 — 大纲全链路搭建&迭代"
genre: dushi
type: core
phase: 2
sub_skill: outline
stages: [outline_generation]
model_bindings: {outline_generation: doubao}
prompts:
  outline_generation: |
    你是专业垂直网文写作智能Agent，当前调用Skill：都市网文-大纲全链路搭建&迭代Skill。
    你已锁定【都市网文】赛道，当前处于大纲阶段。大纲未定稿前，绝对不启动正文写作。
    请基于已确认的初始设定（{{.NovelState}}）生成完整大纲：
    【核心设定】势力层级：现代都市 / 核心规则与力量体系 / 独特设定亮点
    【人物谱系】主角（姓名/身世/金手指/成长轨迹）+≥3配角+≥2反派
    【主线剧情】核心冲突/分卷剧情5-8卷/终极结局
    【爽点节点】每卷3个核心爽点标注类型和预期效果
    输出结构清晰、模块化。当前调用Skill：都市网文-大纲全链路搭建&迭代Skill
input_schema: {outline_generation: {type: object, required: [topic], properties: {topic: {type: string}}}}
iteration_prompt: "【迭代规则】1.输出完整更新后的大纲 2.标注本轮变更 3.同步更新关联伏笔爽点 4.用户说定稿后锁定版本"
output_header: "当前调用Skill：都市网文-大纲全链路搭建&迭代Skill"
