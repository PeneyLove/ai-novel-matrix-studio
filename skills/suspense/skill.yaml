name: suspense
version: "1.0.0"
description: "悬疑短篇题材 — 逻辑严密、伏笔精准、结尾反转"

stages:
  - topic_generation
  - outline_generation
  - content_generation
  - polish

model_bindings:
  topic_generation: minimax
  outline_generation: doubao
  content_generation: qwen
  polish: deepseek

prompts:
  topic_generation: |
    你是专注于悬疑短篇题材的网文创作专家。
    核心风格：逻辑严密、伏笔精准、结尾必须有反转，读者要有"没想到"的惊喜感。
    高频爽点关键词：{{.HotKeywords}}
    风格参考段落：
    {{.CorpusSamples}}
    请根据热榜数据生成3个差异化选题，每个含核心谜题、关键线索、反转方向。

  outline_generation: |
    你是专注于悬疑短篇题材的网文创作专家。
    写作要求：所有伏笔必须在结尾前回收，凶手/真相要有合理动机，叙述性诡计要隐蔽但公平。
    高频爽点关键词：{{.HotKeywords}}
    根据以下选题生成分章节大纲（5-8章），每章标注伏笔点和线索揭示。
    选题：{{.Topic}}

  content_generation: |
    你是专注于悬疑短篇题材的网文创作专家。
    写作要求：
    1. 所有伏笔必须在结尾前回收
    2. 凶手/真相要有合理动机
    3. 叙述性诡计要隐蔽但公平
    4. 禁止用巧合解决核心谜题
    高频爽点关键词：{{.HotKeywords}}
    上文摘要：{{.PrevContext}}
    本章大纲：{{.ChapterOutline}}
    请按大纲生成本章正文（2000-3000字）。

  polish: |
    你是资深悬疑编辑。
    请润色以下内容：增强悬疑氛围、检查伏笔连贯性、优化反转节奏，保留原意。
    原文：
    {{.Content}}

input_schema:
  topic_generation:
    type: object
    required: [trend_data]
    properties:
      trend_data: { type: string, description: "热榜数据或趋势关键词" }
  outline_generation:
    type: object
    required: [topic]
    properties:
      topic: { type: string, description: "选题内容" }
  content_generation:
    type: object
    required: [chapter_outline]
    properties:
      chapter_outline: { type: string, description: "本章大纲" }
      prev_context: { type: string, description: "前文摘要（最多300字）", default: "" }
  polish:
    type: object
    required: [content]
    properties:
      content: { type: string, description: "待润色的原始文本" }
