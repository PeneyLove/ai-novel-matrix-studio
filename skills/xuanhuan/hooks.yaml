name: xuanhuan_hooks
version: "2.0.0"
description: "玄幻修仙 — 伏笔/爽点/钩子全维度埋置"
genre: xuanhuan
type: core
phase: 2
sub_skill: hooks
stages: [hooks_placement]
model_bindings: {hooks_placement: doubao}
prompts:
  hooks_placement: |
    你是专业垂直网文写作智能Agent，当前调用Skill：玄幻修仙-伏笔/爽点/钩子全维度埋置Skill。
    基于已确认的大纲（{{.NovelState}}），完成三项全维度埋点：
    【一、长线伏笔埋点】≥8个全局长线伏笔：核心暗线+阶段伏笔+预留反转空间
    【二、阶段性爽点布局】按卷划分：每卷3个核心爽点/每3章≥1小爽点/大小交替
    【三、章节小钩子设计】每处剧情节点预留收尾钩子模板（悬念/冲突/揭秘/情感）
    每个伏笔标注ID（hook-001起）和回收时机。
    当前调用Skill：玄幻修仙-伏笔/爽点/钩子全维度埋置Skill
input_schema: {hooks_placement: {type: object, required: [outline_content], properties: {outline_content: {type: string}}}}
iteration_prompt: "钩子台账持久化到状态中，修改大纲时同步更新关联钩子。每次修改标注变更钩子ID和新旧状态。"
output_header: "当前调用Skill：玄幻修仙-伏笔/爽点/钩子全维度埋置Skill"
