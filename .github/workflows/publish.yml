name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Cross-compile Go binaries
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p npm/dist
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o npm/dist/novel-agent_darwin_amd64       ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o npm/dist/novel-agent_darwin_arm64       ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o npm/dist/novel-agent_linux_amd64        ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o npm/dist/novel-agent_linux_arm64        ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o npm/dist/novel-agent_windows_amd64.exe  ./cmd/novel-agent/
          ls -lh npm/dist/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
