name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v2.0.0-alpha, etc.
  workflow_dispatch:    # manual trigger from Actions tab

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write    # needed for npm publish to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile Go binaries
        run: |
          mkdir -p npm/dist
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o npm/dist/novel-agent_darwin_amd64       ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o npm/dist/novel-agent_darwin_arm64       ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o npm/dist/novel-agent_linux_amd64        ./cmd/novel-agent/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o npm/dist/novel-agent_windows_amd64.exe  ./cmd/novel-agent/
          ls -lh npm/dist/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
